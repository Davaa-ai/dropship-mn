<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bambi Room - Тун удахгүй</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap">
    <style>
        body {
            background-color: #fdfaf6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #4A3728;
        }
        .container {
            padding: 20px;
            max-width: 600px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 12px rgba(224, 160, 113, 0.2));
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.8;
            margin-bottom: 32px;
        }
        .badge {
            display: inline-block;
            background: #E0A071;
            color: white;
            padding: 8px 16px;
            border-radius: 99px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Удахгүй нээгдэнэ</div>
        <img src="./public/baby-chair/logo-optimized.webp" alt="Bambi Room" class="logo" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><text y=\'.9em\' font-size=\'80\'>🦌</text></svg>'">
        <h1>Bambi Room</h1>
        <p>Бид бяцхан үрсийнхээ ертөнцөд хамгийн эгдүүтэй, аюулгүй, хэрэгцээт бүтээгдэхүүнүүдийг бэлтгэж байна. Тун удахгүй уулзацгаая. 🍂</p>
    </div>

    <div class="footer">
        &copy; 2026 Bambi Room. Бүх эрх хуулиар хамгаалагдсан.
    </div>

</body>
</html>
